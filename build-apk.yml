name: Build DISHA Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          pwd
          ls -la
          test -f frontend/package.json
          test -f frontend/app.json
          test -f backend/server.py
          echo "Repository structure OK"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Expo project check
        working-directory: frontend
        run: |
          npx expo --version
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"

      - name: Generate Android project
        working-directory: frontend
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DISHA-v1-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
