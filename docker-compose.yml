services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - disha_mongo:/data/db
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: disha
      JWT_SECRET: change-this-before-production
    ports:
      - "8001:8001"
    depends_on:
      - mongo
volumes:
  disha_mongo:
